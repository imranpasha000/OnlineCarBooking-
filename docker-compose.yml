services:
  mysql:
    image: mysql:8.4
    container_name: boxcars-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: boxcars-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: boxcars-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      USER_SERVICE_URL: http://user-service:8082
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy

  vehicle-service:
    build:
      context: ./backend
      dockerfile: vehicle-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vehicle_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy

  trip-service:
    build:
      context: ./backend
      dockerfile: trip-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/trip_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - rabbitmq
      - redis

  rental-service:
    build:
      context: ./backend
      dockerfile: rental-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rental_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8085:8085"
    depends_on:
      - mysql
      - rabbitmq

  matching-service:
    build:
      context: ./backend
      dockerfile: matching-service/Dockerfile
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8086:8086"
    depends_on:
      - rabbitmq
      - redis

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      STRIPE_API_KEY: sk_test_mock
    ports:
      - "8087:8087"
    depends_on:
      - mysql
      - rabbitmq

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8088:8088"
    depends_on:
      - rabbitmq

  rating-service:
    build:
      context: ./backend
      dockerfile: rating-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rating_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8089:8089"
    depends_on:
      mysql:
        condition: service_healthy

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    environment:
      AUTH_SERVICE_URI: http://auth-service:8081
      USER_SERVICE_URI: http://user-service:8082
      VEHICLE_SERVICE_URI: http://vehicle-service:8083
      TRIP_SERVICE_URI: http://trip-service:8084
      RENTAL_SERVICE_URI: http://rental-service:8085
      MATCHING_SERVICE_URI: http://matching-service:8086
      PAYMENT_SERVICE_URI: http://payment-service:8087
      NOTIFICATION_SERVICE_URI: http://notification-service:8088
      RATING_SERVICE_URI: http://rating-service:8089
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - user-service
      - vehicle-service
      - trip-service
      - rental-service
      - matching-service
      - payment-service
      - notification-service
      - rating-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  mysql_data:
