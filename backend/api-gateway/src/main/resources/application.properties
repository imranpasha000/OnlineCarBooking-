server.port=8080
spring.application.name=api-gateway
app.jwt.secret=BoxCarsJwtSecretKeyMustBeAtLeast256BitsLongForHS256Algorithm!!
app.jwt.expiration=86400000

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URI:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URI:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[2].id=vehicle-service
spring.cloud.gateway.routes[2].uri=${VEHICLE_SERVICE_URI:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/vehicles/**

spring.cloud.gateway.routes[3].id=trip-service
spring.cloud.gateway.routes[3].uri=${TRIP_SERVICE_URI:http://localhost:8084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/trips/**

spring.cloud.gateway.routes[4].id=rental-service
spring.cloud.gateway.routes[4].uri=${RENTAL_SERVICE_URI:http://localhost:8085}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/rentals/**

spring.cloud.gateway.routes[5].id=matching-service
spring.cloud.gateway.routes[5].uri=${MATCHING_SERVICE_URI:http://localhost:8086}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/matching/**

spring.cloud.gateway.routes[6].id=payment-service
spring.cloud.gateway.routes[6].uri=${PAYMENT_SERVICE_URI:http://localhost:8087}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=${NOTIFICATION_SERVICE_URI:http://localhost:8088}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[8].id=rating-service
spring.cloud.gateway.routes[8].uri=${RATING_SERVICE_URI:http://localhost:8089}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/ratings/**

management.endpoints.web.exposure.include=health,info
